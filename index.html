<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Aniversário 🎂</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  overflow-x:hidden;
  background: radial-gradient(circle at top,#1a1a2e,#0f0f1a);
  color:white;
}

/* canvas não bloqueia toque */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
  pointer-events:none;
}

/* telas */
.screen{
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  transition: opacity 0.6s ease;
  z-index: 10;
}

#start { opacity:1; z-index:20; }
#main { opacity:0; }

/* card */
.card{
  width:92%;
  max-width:480px;
  max-height:90vh;
  overflow-y:auto;
  background: rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(15px);
  padding:20px;
  border-radius:25px;
  text-align:center;
}

/* foto */
.top-photo{
  width:100%;
  height:150px;
  border-radius:12px;
  object-fit:cover;
  margin-bottom:10px;
}

/* slider */
.slider{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  gap:8px;
  border-radius:12px;
  margin:15px 0;
  touch-action: pan-x;
}

.slide-item{
  flex:0 0 85%;
  scroll-snap-align:center;
  border-radius:12px;
  overflow:hidden;
}

.slide-item img{
  width:100%;
  height:160px;
  object-fit:cover;
}

/* bolinhas */
.indicadores{
  display:flex;
  justify-content:center;
  gap:6px;
}

.bolinha{
  width:7px;
  height:7px;
  border-radius:50%;
  background:#ffffff50;
}

.bolinha.ativa{
  background:#ff4d6d;
  width:18px;
  border-radius:10px;
}

/* texto */
h1{
  font-size:1.5em;
  margin-bottom:5px;
}

.nome{
  font-size:1.5em;
  font-weight:bold;
}

#msg{
  margin:10px 0;
  min-height:70px;
  white-space:pre-line;
}

/* botão */
.btn{
  margin-top:15px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#ff4d6d;
  color:white;
  font-weight:bold;
  font-size:1em;
}

/* botão som */
.sound-toggle{
  position:fixed;
  bottom:15px;
  right:15px;
  width:45px;
  height:45px;
  border-radius:50%;
  background:#00000080;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  z-index:100;
}
</style>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<canvas id="bg"></canvas>

<audio id="bgMusic" loop>
  <source src="parabens-da-xuxa_hsKzvzV.mp3">
</audio>

<div id="soundBtn" class="sound-toggle" style="display:none;">🔊</div>

<!-- START -->
<div id="start" class="screen">
  <div class="card">
    <h1>🎁 Ei, Felps</h1>
    <p style="margin:15px 0;">Preparei algo pra você</p>
    <button class="btn" id="btnAbrir">✨ ABRIR ✨</button>
  </div>
</div>

<!-- MAIN -->
<div id="main" class="screen">
  <div class="card">

    <img src="felps (1).jpg" class="top-photo">

    <h1>🎉 FELIZ ANIVERSÁRIO 🎂</h1>
    <div class="nome">FELPS GAY</div>
    <div id="idade"></div>

    <div class="slider" id="slider">
      <div class="slide-item"><img src="IMG_20240524_164312.jpg"></div>
      <div class="slide-item"><img src="IMG_20240523_072654.jpg"></div>
      <div class="slide-item"><img src="IMG-20240826-WA0005.jpg"></div>
    </div>

    <div class="indicadores" id="indicadores">
      <span class="bolinha ativa"></span>
      <span class="bolinha"></span>
      <span class="bolinha"></span>
    </div>

    <p id="msg"></p>

  </div>
</div>

<script>
const musica = document.getElementById("bgMusic");
const btnAbrir = document.getElementById("btnAbrir");
const soundBtn = document.getElementById("soundBtn");
const slider = document.getElementById("slider");
const bolinhas = document.querySelectorAll(".bolinha");

/* abrir */
btnAbrir.addEventListener("pointerdown", () => {

  musica.play().catch(()=>{});
  soundBtn.style.display = "flex";

  document.getElementById("start").style.opacity = "0";
  document.getElementById("main").style.opacity = "1";

  document.getElementById("idade").innerText =
    (new Date().getFullYear() - 2009) + " anos";

  digitarTexto("feliz aniversário viado 🎉", document.getElementById("msg"));
});

/* som */
soundBtn.addEventListener("pointerdown", () => {
  if(musica.paused){
    musica.play();
    soundBtn.innerText="🔊";
  }else{
    musica.pause();
    soundBtn.innerText="🔈";
  }
});

/* texto */
function digitarTexto(texto, el){
  let i=0;
  let loop=setInterval(()=>{
    el.innerHTML+=texto[i];
    i++;
    if(i>=texto.length) clearInterval(loop);
  },30);
}

/* bolinhas */
slider.addEventListener("scroll", () => {
  let index = Math.round(slider.scrollLeft / slider.offsetWidth);

  bolinhas.forEach((b,i)=>{
    b.classList.toggle("ativa", i===index);
  });
});

/* partículas leves */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];

for(let i=0;i<40;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    dx:(Math.random()-0.5)*0.5,
    dy:(Math.random()-0.5)*0.5
  });
}

function animar(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;
  });

  requestAnimationFrame(animar);
}
animar();
</script>

</body>
</html>
