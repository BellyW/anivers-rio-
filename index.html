<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Aniversário 🎂</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background: radial-gradient(circle at top,#1a1a2e,#0f0f1a);
  color:white;
}

/* partículas */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* telas */
.screen{
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  transition:1s;
}

/* card */
.card{
  width:90%;
  max-width:500px;
  background: rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
  padding:25px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 0 40px rgba(255,255,255,0.1);
}

/* foto destaque */
.top-photo{
  width:100%;
  height:180px;
  border-radius:15px;
  object-fit:cover;
  margin-bottom:10px;
}

/* slideshow */
.slider{
  position:relative;
  width:100%;
  height:150px;
  overflow:hidden;
  border-radius:15px;
  margin-top:10px;
}

.slider img{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  opacity:0;
  transition:0.5s;
}

.slider img.active{
  opacity:1;
}

/* título */
h1{
  font-size:2em;
  background: linear-gradient(45deg,#ff4d6d,#ff9a9e);
  -webkit-background-clip:text;
  color:transparent;
}

/* nome */
.nome{
  font-size:1.4em;
  margin:8px 0;
  animation: brilho 2s infinite alternate;
}

@keyframes brilho{
  from{ text-shadow:0 0 10px #ff4d6d; }
  to{ text-shadow:0 0 25px #ff4d6d; }
}

.idade{
  opacity:0.7;
}

/* texto */
#msg{
  margin-top:10px;
}

/* caixa */
.box{
  background: rgba(255,255,255,0.05);

}

.spotify{

#main{opacity:0;pointer-events:none;}
</style>
</head>

<canvas id="bg"></canvas>

<audio id="bgMusic" loop>
  <source src="parabens-da-xuxa_hsKzvzV.mp3" type="audio/mp3">

<!-- tela inicial -->

<!-- tela principal -->
<div id="main" class="screen">
  <div class="card">

    <!-- FOTO PRINCIPAL -->
    <img src="foto1.jpg" class="top-photo">

    <h1>🎉 Feliz Aniversário 🎂</h1>

    <div class="nome">FELPS GAY</div>

    <!-- SLIDESHOW -->

    </div>

      🎧 música especial
    </a>

  </div>
</div>

<script>
const musica = document.getElementById("bgMusic");

function abrir(){
  trocarTela("start","main");
  musica.play().catch(()=>{});

  let msg = document.getElementById("msg");
  digitarTexto("17 anos já...\ntu tá ficando velho KKKKK\n\nmas sério...\ntu é importante 💖", msg);
}

document.body.addEventListener("click", ()=>{
  musica.play().catch(()=>{});
}, { once:true });

let idade = new Date().getFullYear() - 2009;
document.getElementById("idade").innerText = idade + " anos de caos";

/* digitar */
function digitarTexto(texto, elemento){
  let i=0;
  elemento.innerHTML="";
  let intervalo=setInterval(()=>{
    elemento.innerHTML += texto.charAt(i);
    i++;
    if(i>=texto.length){
      clearInterval(intervalo);
    }
  },40);
}

/* trocar tela */
function trocarTela(sair,entrar){
  document.getElementById(sair).style.opacity=0;
  setTimeout(()=>{
    document.getElementById(sair).style.display="none";
    let el=document.getElementById(entrar);
    el.style.opacity=1;
    el.style.pointerEvents="all";
  },800);
}

/* slideshow automático */
let index=0;
let imgs=document.querySelectorAll(".slider img");

setInterval(()=>{
  imgs[index].classList.remove("active");
  index=(index+1)%imgs.length;
  imgs[index].classList.add("active");
},2500);

/* swipe */
let startX=0;

document.getElementById("slider").addEventListener("touchstart",(e)=>{
  startX=e.touches[0].clientX;
});

document.getElementById("slider").addEventListener("touchend",(e)=>{
  let endX=e.changedTouches[0].clientX;

  if(startX > endX + 50){
    mudarSlide(1);
  }else if(startX < endX - 50){
    mudarSlide(-1);
  }
});

function mudarSlide(dir){
  imgs[index].classList.remove("active");
  index=(index+dir+imgs.length)%imgs.length;
  imgs[index].classList.add("active");
}

/* partículas */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];
for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
