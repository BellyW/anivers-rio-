<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Aniversário 🎂</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background: radial-gradient(circle at top,#1a1a2e,#0f0f1a);
  color:white;
}

/* partículas */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* telas */
.screen{
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  transition:1s;
}

/* card */
.card{
  width:90%;
  max-width:500px;
  background: rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
  padding:30px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 0 40px rgba(255,255,255,0.1);
}

/* título */
h1{
  font-size:2.3em;
  background: linear-gradient(45deg,#ff4d6d,#ff9a9e);
  -webkit-background-clip:text;
  color:transparent;
}

/* nome */
.nome{
  font-size:1.6em;
  margin:10px 0;
  animation: brilho 2s infinite alternate;
}

@keyframes brilho{
  from{ text-shadow:0 0 10px #ff4d6d; }
  to{ text-shadow:0 0 25px #ff4d6d; }
}

.idade{
  opacity:0.7;
  margin-bottom:10px;
}

/* texto digitando */
#msg{
  margin-top:15px;
}

/* caixa personalizada */
.box{
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  padding:15px;
  margin-top:15px;
  font-size:0.95em;
  line-height:1.4;
}

/* spotify */
.spotify{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  border-radius:20px;
  background:#1DB954;
  color:white;
  text-decoration:none;
  font-size:0.9em;
  transition:0.3s;
}

.spotify:hover{
  transform:scale(1.1);
}

/* botão */
.btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:15px;
  background: linear-gradient(45deg,#ff4d6d,#ff758c);
  color:white;
  cursor:pointer;
  font-size:1em;
}

/* esconder tela principal */
#main{opacity:0;pointer-events:none;}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<audio id="bgMusic" loop>
  <source src="parabens-da-xuxa_hsKzvzV.mp3" type="audio/mp3">
</audio>

<!-- tela inicial -->
<div id="start" class="screen">
  <div class="card">
    <h1>🎁 Ei porra</h1>
    <p>abre isso aqui 👀</p>
    <button class="btn" onclick="abrir()">abrir</button>
  </div>
</div>

<!-- tela principal -->
<div id="main" class="screen">
  <div class="card">

    <h1>🎉 Feliz Aniversário 🎂</h1>

    <div class="nome">FELPS GAY</div>
    <div class="idade" id="idade"></div>

    <p id="msg"></p>

    <div class="box">
      escreve aqui teu textinho 💖<br><br>
      tipo mensagem fofa ou zoeira KKKK
    </div>

    <a class="spotify" href="LINK_AQUI" target="_blank">
      🎧 ouvir música especial
    </a>

  </div>
</div>

<script>
const musica = document.getElementById("bgMusic");

function abrir(){
  trocarTela("start","main");
  musica.play().catch(()=>{});

  let msg = document.getElementById("msg");
  digitarTexto("17 anos já...\ntu tá ficando velho KKKKK\n\nmas sério...\ntu é importante pra caralho 💖", msg);
}

/* fallback áudio */
document.body.addEventListener("click", ()=>{
  musica.play().catch(()=>{});
}, { once:true });

let idade = new Date().getFullYear() - 2009;
document.getElementById("idade").innerText = idade + " anos de caos";

/* digitar texto */
function digitarTexto(texto, elemento){
  let i=0;
  elemento.innerHTML="";
  let intervalo=setInterval(()=>{
    elemento.innerHTML += texto.charAt(i);
    i++;
    if(i>=texto.length){
      clearInterval(intervalo);
    }
  },40);
}

/* trocar tela */
function trocarTela(sair,entrar){
  document.getElementById(sair).style.opacity=0;
  setTimeout(()=>{
    document.getElementById(sair).style.display="none";
    let el=document.getElementById(entrar);
    el.style.opacity=1;
    el.style.pointerEvents="all";
  },800);
}

/* partículas */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
